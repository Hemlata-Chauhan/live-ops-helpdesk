<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Live Ops Helpdesk</title>

    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

    <div class="container">

        <h1>🎫 Live Ops Helpdesk</h1>

        <div class="card">

            <div class="field">
                <label>Agent Name</label>
                <input type="text" id="agentName" placeholder="Enter agent name" />
            </div>

            <div class="field">
                <label>Ticket ID</label>
                <input type="text" id="ticketId" placeholder="Enter ticket ID" />
            </div>

            <div class="button-group">
                <button id="joinBtn">
                    Join Dashboard
                </button>

                <button id="lockBtn">
                    Lock Ticket
                </button>

                <button id="unlockBtn">
                    Unlock Ticket
                </button>
            </div>

        </div>

        <div class="logs-card">

            <h2>Activity Log</h2>

            <ul id="logs"></ul>

        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script src="./js/app.js"></script>

</body>

</html>
