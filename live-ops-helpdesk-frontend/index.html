<div class="container">

    <div class="hero">
        <div>
            <span class="badge">LIVE OPERATIONS</span>

            <h1>
                Real-Time Ticket
                <span>Lock Management</span>
            </h1>

            <p>
                Prevent duplicate ownership, synchronize
                agents instantly, and recover from ghost
                disconnects automatically.
            </p>
        </div>

        <div class="status-card">
            <div class="status-dot"></div>
            <span>Socket Connected</span>
        </div>
    </div>

    <div class="dashboard-grid">

        <div class="control-panel">

            <h2>Agent Console</h2>

            <div class="field">
                <label>Agent Name</label>
                <input type="text" id="agentName" placeholder="Enter your name" />
            </div>

            <div class="field">
                <label>Ticket ID</label>
                <input type="text" id="ticketId" placeholder="e.g. T101" />
            </div>

            <div class="button-group">
                <button id="joinBtn">
                    Join Dashboard
                </button>

                <button id="lockBtn">
                    Lock Ticket
                </button>

                <button id="unlockBtn">
                    Unlock Ticket
                </button>
            </div>

        </div>

        <div class="logs-panel">

            <div class="panel-header">
                <h2>Activity Stream</h2>

                <span class="live-pill">
                    LIVE
                </span>
            </div>

            <ul id="logs"></ul>

        </div>

    </div>

</div>
